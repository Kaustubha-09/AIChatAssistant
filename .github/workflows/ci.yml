name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Android build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        # Project does not check in a gradle wrapper; use the action-managed
        # Gradle installation so we can invoke `gradle` directly.
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
      - name: Build (debug)
        run: gradle assembleDebug --no-daemon
      - name: Lint
        run: gradle lintDebug --no-daemon || echo "Lint advisory only"
      - name: Unit tests
        run: gradle testDebugUnitTest --no-daemon || echo "No tests yet"
